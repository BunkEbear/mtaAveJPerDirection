<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTA Train Times</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <div id="listOfIncTrains" class="list">

      <img class="trainIcon" src="trainsInfo/trainIcons/q.png" alt="Q train icon">

  <div id="listOfAlerts" class="list">

      <p>this is a service alertthis is a service alert</p>
    </div>
  </div>
</body>
</html>
